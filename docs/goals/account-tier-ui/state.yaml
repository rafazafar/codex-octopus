      - "Database/schema contract conflicts with the existing routing_tier migration."
      - "Verification fails twice."
    receipt:
      result: done
      status: done
      summary: "Added account routing tier to account summaries plus `PUT /api/accounts/{account_id}/routing-tier` for set/clear. Invalid tiers reject before persistence. Account selection cache invalidates on successful tier changes."
      changed_files:
