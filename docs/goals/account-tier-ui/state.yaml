          result: pass
        - command: "openspec validate weighted-account-routing --strict"
          result: pass
      commands:
        - command: ".venv/bin/python -m pytest tests/integration/test_accounts_api.py tests/unit/test_db_models.py"
          status: pass
        - command: ".venv/bin/python -m ruff check app/modules/accounts tests/integration/test_accounts_api.py tests/unit/test_db_models.py"
          status: pass
        - command: "openspec validate weighted-account-routing --strict"
