        - "app/modules/accounts/service.py"
        - "app/modules/accounts/repository.py"
        - "app/modules/accounts/mappers.py"
        - "tests/integration/test_accounts_api.py"
        - "openspec/changes/weighted-account-routing/tasks.md"
      verification:
