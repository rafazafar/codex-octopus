version: 2

goal:
  title: "Account Tier UI"
  slug: "account-tier-ui"
  kind: specific
  tranche: "Add verified dashboard/API workflow for configuring account routing tiers."
  status: done
  intake:
    original_request: "Add the UI for configuring account tiers."
    interpreted_outcome: "Operators can set gold, silver, bronze, or default account routing tiers from the dashboard and have the choice persist into weighted routing."
    input_shape: specific
    audience: "dashboard operators"
    authority: requested
    proof_type: test
    completion_proof: "Dashboard workflow persists per-account routing tiers, backend reads return the tier, default/unlabeled remains bronze, and tests/browser verification prove the flow."
    likely_misfire: "A visual label appears but operators cannot edit or persist account routing tiers."
    blind_spots_considered:
      - "Focus first tranche on Accounts page/API tier labels."
      - "Settings UI for tier weights is optional follow-up unless evidence shows it is needed."
      - "Existing weighted-routing OpenSpec and implementation should be extended rather than duplicated."
    existing_plan_facts:
      - "Weighted routing backend already added account routing_tier, config-driven weights, and bronze fallback."
      - "User asked for the missing menu/UI."
      - "Local live GoalBuddy board selected."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  selected: local
  local:
    status: running
    url: "http://127.0.0.1:41737/"
    command: "npx goalbuddy board /Users/zafar/dev/codex-octopus/docs/goals/account-tier-ui"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: default
    objective: "Map existing account API/frontend patterns, weighted-routing artifacts, and verification commands needed for account tier UI."
    inputs:
      - "Existing account dashboard/API/frontend code discovered by search."
      - "Existing weighted-account-routing OpenSpec artifacts and changed files."
      - "Existing frontend/backend tests discovered by search."
    constraints:
      - "Read-only."
      - "Do not implement."
      - "Prefer concrete file-path evidence."
      - "Record relevant frontend design/test conventions for later Worker tasks."
    expected_output:
      - "Relevant account API/service/repository/schema/frontend files."
      - "OpenSpec change strategy: extend weighted-account-routing or create follow-up change."
      - "Minimal UI/API slice recommendation."
      - "Verification commands."
      - "Allowed file candidates and risks."
    receipt:
      result: done
      status: done
      summary: "Mapped account tier UI/API surface. Existing `openspec/changes/weighted-account-routing` owns tier behavior and should be extended. Backend has `Account.routing_tier` and list/import/pause/delete APIs under `app/modules/accounts/*`; summaries are built in `app/modules/accounts/mappers.py`. Frontend Accounts page lives under `frontend/src/features/accounts/*`; list/detail/actions already use React Query mutations and MSW handlers."
      evidence:
        - "Backend API: app/modules/accounts/api.py"
        - "Backend schemas: app/modules/accounts/schemas.py"
        - "Backend service/repository: app/modules/accounts/service.py, app/modules/accounts/repository.py"
        - "Summary mapper: app/modules/accounts/mappers.py"
        - "Frontend schema/API/hooks: frontend/src/features/accounts/schemas.ts, api.ts, hooks/use-accounts.ts"
        - "Frontend UI: frontend/src/features/accounts/components/account-list-item.tsx, account-detail.tsx, account-actions.tsx, accounts-page.tsx"
        - "Mocks/tests: frontend/src/test/mocks/handlers.ts, factories.ts, frontend/src/__integration__/accounts-flow.test.tsx, tests/integration/test_accounts_api.py"
        - "Spec: openspec/changes/weighted-account-routing/specs/account-routing/spec.md"
      recommendation: "Extend `weighted-account-routing` with dashboard/API requirements, add `routingTier` to account summaries, add a focused update endpoint, add React Query mutation and Accounts detail selector. Keep Settings weight editor out of first tranche."
      verify_candidates:
        - "openspec validate weighted-account-routing --strict"
        - ".venv/bin/python -m pytest tests/integration/test_accounts_api.py tests/unit/test_db_models.py"
        - "npm --prefix frontend test -- accounts"
        - "npm --prefix frontend run typecheck"
  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Choose the safest OpenSpec and implementation sequence for account tier UI."
    inputs:
      - "T001 receipt"
      - "Goal intake facts."
    constraints:
      - "Read-only."
      - "Require OpenSpec before behavior implementation."
      - "Keep first tranche focused on account tier UI/API unless evidence requires tier-weight settings UI."
    expected_output:
      - "Decision on OpenSpec change id."
      - "Exact Worker objective for OpenSpec artifacts."
      - "Exact Worker objective for backend/API slice."
      - "Exact Worker objective for frontend UI slice."
      - "allowed_files"
      - "verify"
      - "stop_if"
    receipt:
      result: done
      status: done
      decision: "Extend existing `weighted-account-routing` OpenSpec change. Do not create a second change. Implement first tranche as per-account tier assignment in Accounts UI/API."
      scope:
        - "API returns `routingTier` as `gold`, `silver`, `bronze`, or null/default."
        - "API accepts tier update for `gold`, `silver`, `bronze`, or null/default; invalid values reject."
        - "Accounts detail UI exposes compact selector and persists changes through React Query."
        - "Settings UI for tier weights remains out of scope."
      worker_sequence:
        - "T003 update OpenSpec spec/tasks."
        - "T004 implement backend API/schema/service/repository tests."
        - "T005 implement frontend schema/API/hook/UI/mock/tests."
      verify:
        - "openspec validate weighted-account-routing --strict"
        - ".venv/bin/python -m pytest tests/integration/test_accounts_api.py tests/unit/test_db_models.py"
        - "npm --prefix frontend test -- accounts"
        - "npm --prefix frontend run typecheck"
  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: default
    objective: "Create or update OpenSpec artifacts for account tier UI/API as selected by Judge."
    allowed_files:
      - "openspec/changes/weighted-account-routing/specs/account-routing/spec.md"
      - "openspec/changes/weighted-account-routing/tasks.md"
    verify:
      - "openspec validate weighted-account-routing --strict"
    stop_if:
      - "Need OpenSpec files outside Judge-approved allowed_files."
      - "The intended UI/API behavior is ambiguous."
    receipt:
      result: done
      status: done
      summary: "Extended `weighted-account-routing` OpenSpec with dashboard/API account tier assignment requirements and task checklist."
      changed_files:
        - "openspec/changes/weighted-account-routing/specs/account-routing/spec.md"
        - "openspec/changes/weighted-account-routing/tasks.md"
      verification:
        - command: "openspec validate weighted-account-routing --strict"
          result: pass
      commands:
        - command: "openspec validate weighted-account-routing --strict"
          status: pass
  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: default
