version: 2

goal:
  title: "Weighted Account Routing"
  slug: "weighted-account-routing"
  kind: open_ended
  tranche: "Discover requirements, design safe routing bias, implement verified slices, and audit full outcome."
  status: done
  intake:
    original_request: "Steer or bias routing to certain accounts by labeling accounts with tiers like gold, silver, bronze so certain accounts are used significantly more than others."
    interpreted_outcome: "Account routing supports owner-defined weighted-share tiers that cause selected accounts to receive measurably more traffic than lower-tier accounts, with unlabeled accounts defaulting to bronze."
    input_shape: vague
    audience: "owner/operators of the account routing system"
    authority: requested
    proof_type: test
    completion_proof: "Tests or simulation prove configured tier ratios bias route selection toward higher tiers within accepted tolerance, while existing routing behavior and constraints still pass."
    likely_misfire: "Labels exist, but routing share is not measurably biased or existing routing safety constraints regress."
    blind_spots_considered:
      - "Tier semantics chosen as weighted share, not priority fallback."
      - "Config-driven ratios chosen so operators can change tier weights."
      - "Undefined/unlabeled accounts should default to bronze so existing accounts remain usable at low share."
      - "First tranche should stay inside routing internals and config contract unless Scout/Judge prove API or UI changes are required."
      - "What evidence proves significantly more traffic."
    existing_plan_facts:
      - "Local live GoalBuddy board selected."
      - "Gold/silver/bronze should bias routing by weighted share."
      - "Tier ratios should be config-driven rather than hardcoded policy."
      - "Undefined/unlabeled accounts should default to bronze."
      - "First tranche should avoid UI/API surface changes unless needed for routing internals."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://127.0.0.1:41737/"
    command: "npx goalbuddy board /Users/zafar/dev/codex-octopus/docs/goals/weighted-account-routing"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: default
    objective: "Map the existing routing/account/spec surfaces relevant to weighted-share account tiers."
    inputs:
      - "openspec/specs/**"
      - "Routing/account configuration code discovered by search."
      - "Existing tests and verification commands discovered by search."
    constraints:
      - "Read-only."
      - "Treat OpenSpec as source of truth."
      - "Prefer concrete file-path evidence over generic advice."
      - "Do not propose UI/API scope unless required by evidence."
    expected_output:
      - "Relevant capability specs and gaps."
      - "Current routing/account selection flow."
      - "Where tier/weight config could safely live."
      - "How undefined/unlabeled accounts currently appear and how bronze default can preserve compatibility."
      - "Existing verification commands."
      - "Risk list and candidate Worker scopes."
    receipt:
      result: done
      summary: "Routing selection is centered on AccountState/select_account in app/core/balancer/logic.py, fed by Account rows through app/modules/proxy/load_balancer.py. Existing capacity_weighted already uses random.choices over remaining secondary credits, but there is no account tier or per-tier weight config. Account persistence currently has Account.plan_type/status/reset/block fields but no routing tier. Settings expose routing_strategy only. OpenSpec main specs validate, but no current spec covers account weighting by owner labels."
      evidence:
        - "app/core/balancer/logic.py"
        - "app/modules/proxy/load_balancer.py"
        - "app/db/models.py"
        - "app/modules/settings/schemas.py"
        - "app/modules/accounts/schemas.py"
        - "tests/unit/test_load_balancer.py"
        - "openspec/changes/archive/2026-04-14-capacity-weighted-routing/proposal.md"
      verification:
        - cmd: "openspec validate --specs"
          status: pass
      candidate_worker_scopes:
        - "OpenSpec change under openspec/changes/weighted-account-routing/**."
        - "Minimal routing-internals slice likely touches app/core/balancer/logic.py, app/modules/proxy/load_balancer.py, app/db/models.py plus Alembic migration and focused balancer tests."
      risks:
        - "Pure settings-only account-id mapping would avoid schema/API changes but would not really label accounts and could be brittle during account import/delete."
        - "DB account tier column preserves unlabeled accounts via nullable/default bronze semantics but creates migration and later API/UI follow-up work."
        - "Existing sticky affinity may hide weighted distribution for sticky-key traffic; proof should focus non-sticky selection and avoid changing sticky behavior."
  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Choose the safest first implementation sequence for config-driven weighted-share routing tiers."
    inputs:
      - "T001 receipt"
      - "Original request and intake facts in goal state."
    constraints:
      - "Read-only."
      - "Require OpenSpec change before behavior implementation."
      - "Keep first tranche to routing internals and config contract unless evidence requires broader surface."
    expected_output:
      - "Decision on OpenSpec change id and requirements to add."
      - "Decision confirming or revising bronze-default semantics for undefined accounts based on evidence."
      - "Exact Worker objective for OpenSpec artifacts."
      - "Exact Worker objective for first code slice."
      - "allowed_files for each Worker slice."
      - "verify commands and stop_if conditions."
    receipt:
      result: done
      decision: "Proceed with change id weighted-account-routing. Add a new account-routing OpenSpec delta first. Preserve bronze-default semantics. First code slice should persist an account routing tier, map missing/unknown tiers to bronze, add config-driven tier weights in runtime settings, and apply tier weights inside capacity_weighted selection by multiplying remaining capacity by tier weight. Defer dashboard/API editing surface unless implementation evidence shows it is required."
      open_spec_worker:
        objective: "Create OpenSpec artifacts for account-routing weighted tiers under openspec/changes/weighted-account-routing/**."
        allowed_files:
          - "openspec/changes/weighted-account-routing/proposal.md"
          - "openspec/changes/weighted-account-routing/design.md"
          - "openspec/changes/weighted-account-routing/specs/account-routing/spec.md"
          - "openspec/changes/weighted-account-routing/tasks.md"
        verify:
          - "openspec validate weighted-account-routing --strict"
          - "openspec validate --specs"
        stop_if:
          - "OpenSpec CLI rejects new account-routing capability shape twice."
          - "Need to modify main specs directly before implementation."
      code_worker:
        objective: "Implement config-driven weighted routing tiers for capacity_weighted account selection with bronze default for unlabeled accounts."
        allowed_files:
          - "app/core/balancer/logic.py"
          - "app/modules/proxy/load_balancer.py"
          - "app/db/models.py"
          - "app/db/alembic/versions/20260512_000000_add_accounts_routing_tier.py"
          - "app/core/config/settings.py"
          - "tests/unit/test_load_balancer.py"
          - "tests/unit/test_settings_cache.py"
          - "tests/integration/test_db_models.py"
        verify:
          - ".venv/bin/python -m pytest tests/unit/test_load_balancer.py"
          - ".venv/bin/python -m pytest tests/integration/test_db_models.py"
          - "openspec validate weighted-account-routing --strict"
          - "openspec validate --specs"
        stop_if:
          - "Need API/UI files for first tranche."
          - "Need product decision beyond gold/silver/bronze weighted share and bronze default."
          - "Migration head conflict cannot be resolved locally."
          - "Verification fails twice."
      next_allowed_task: T003
